<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        #chat-container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #messages { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 85%; line-height: 1.4; }
        .user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #f1f3f4; color: #202124; border-bottom-left-radius: 2px; }
        .controls { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { padding: 10px 20px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 25px; font-weight: bold; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2 style="text-align: center; color: #1a73e8;">Gemini Chat</h2>
    <div id="messages"></div>
    <div class="controls">
        <input type="text" id="userInput" placeholder="Ask Gemini something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Replace with your actual Gemini API Key
    const GEMINI_API_KEY = 'AIzaSyCNO7jP0gice8iz5Y2N3wbeXOvQezgVdH8'; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const messageText = input.value.trim();
        if (!messageText) return;

        appendMessage(messageText, 'user');
        input.value = '';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: messageText }]
                    }]
                })
            });

            const data = await response.json();
            
            // Checking for internal errors from the API
            if (data.error) {
                throw new Error(data.error.message);
            }

            const aiResponse = data.candidates[0].content.parts[0].text;
            appendMessage(aiResponse, 'ai');
        } catch (error) {
            appendMessage("Error: " + error.message, 'ai');
            console.error("Gemini Error:", error);
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        document.getElementById('messages').appendChild(msgDiv);
        const chatBox = document.getElementById('messages');
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
